<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Speedometer</title>

<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    flex-direction: column;
  }

  #warning {
    color: #ff3333;
    font-size: 1.5em;
    font-family: "Poppins", sans-serif;
    letter-spacing: 1px;
    text-shadow: 0 0 15px #ff3333;
    opacity: 0;
    transition: opacity 0.5s ease;
    position: absolute;
    top: 50px;
    text-align: center;
    width: 100%;
  }

  #status {
    color: #00FF99;
    position: absolute;
    bottom: 20px;
    font-family: "Poppins", sans-serif;
    font-size: 1em;
  }

  canvas {
    background: black;
  }
</style>
</head>

<body>

<div id="warning">🚨 Zone Detected – Speed Limit Enforced 🚨</div>
<div id="status">Connecting...</div>
<canvas id="speedometer"></canvas>

<script>
const canvas = document.getElementById("speedometer");
const ctx = canvas.getContext("2d");
const warning = document.getElementById("warning");
const status = document.getElementById("status");

resizeCanvas();

let speed = 0;
let targetSpeed = 0;
let gear = "1";
const maxSpeed = 80;
let zoneRestricted = false;

// Resize canvas
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);

// Draw speedometer
function drawSpeedometer() {
  const cx = canvas.width / 2;
  const cy = canvas.height * 0.75;
  const radius = Math.min(canvas.width, canvas.height) / 2.3;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i <= maxSpeed; i += 5) {
    const angle = Math.PI * (1 + i / maxSpeed);
    const x1 = cx + Math.cos(angle) * (radius - 40);
    const y1 = cy + Math.sin(angle) * (radius - 40);
    const x2 = cx + Math.cos(angle) * radius;
    const y2 = cy + Math.sin(angle) * radius;

    const lit = i <= speed;
    ctx.strokeStyle = lit ? "#00FF99" : "#333";
    ctx.lineWidth = lit ? 4 : 2;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    if (i % 10 === 0) {
      const tx = cx + Math.cos(angle) * (radius - 75);
      const ty = cy + Math.sin(angle) * (radius - 75);
      ctx.fillStyle = lit ? "#00FF99" : "#555";
      ctx.font = `${radius * 0.08}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(i, tx, ty);
    }
  }

  // Arc
  ctx.shadowBlur = 25;
  ctx.shadowColor = "#00FF99";
  ctx.strokeStyle = "#00FF99";
  ctx.lineWidth = 6;

  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI, Math.PI * (1 + speed / maxSpeed));
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Needle
  const angle = Math.PI * (1 + speed / maxSpeed);
  const nx = cx + Math.cos(angle) * (radius - 60);
  const ny = cy + Math.sin(angle) * (radius - 60);

  ctx.strokeStyle = "#00FF99";
  ctx.lineWidth = 6;

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(nx, ny);
  ctx.stroke();

  // Center
  ctx.beginPath();
  ctx.arc(cx, cy, 15, 0, Math.PI * 2);
  ctx.fillStyle = "#00FF99";
  ctx.fill();

  // Speed text
  ctx.fillStyle = "#00FF99";
  ctx.font = `${radius * 0.25}px Arial`;
  ctx.textAlign = "center";
  ctx.fillText(Math.round(speed), cx, cy - radius / 2.2);

  ctx.font = `${radius * 0.08}px Arial`;
  ctx.fillText("Km/h", cx, cy - radius / 3.5);

  // Gear
  ctx.font = `${radius * 0.12}px Arial`;
  ctx.fillText(`Gear: ${gear}`, cx, cy - radius / 7);
}

// Animation
function animate() {
  speed += (targetSpeed - speed) * 0.1;

  if (targetSpeed < speed) {
    speed -= 0.07;
    if (speed < 0) speed = 0;
  }

  drawSpeedometer();
  requestAnimationFrame(animate);
}
animate();

// WebSocket
const socket = new WebSocket("ws://localhost:8765");

socket.onopen = () => {
  console.log("✅ Connected");
  status.textContent = "Connected";
};

socket.onclose = () => {
  console.warn("⚠️ Disconnected");
  status.textContent = "Disconnected";
};

socket.onerror = () => {
  status.textContent = "Error";
};

socket.onmessage = (event) => {
  try {
    const msg = event.data.trim();
    const parts = msg.split(",");

    let parsed = {};

    parts.forEach(p => {
      const [key, value] = p.split(":").map(v => v.trim());
      if (key && value) parsed[key.toLowerCase()] = value;
    });

    if (parsed.speed) targetSpeed = parseFloat(parsed.speed);
    if (parsed.gear) gear = parsed.gear;

    if (parsed.zone) {
      const zoneName = parsed.zone.toLowerCase();

      zoneRestricted = zoneName !== "normal";

      warning.textContent = `🚨 ${parsed.zone} Zone – Speed Limit Enforced 🚨`;
      warning.style.opacity = zoneRestricted ? 1 : 0;
    }

  } catch (e) {
    console.error("Parse error:", e);
  }
};
</script>

</body>
</html>
